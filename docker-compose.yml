version: "3.8"

services:
  mysql:
    image: mysql:8.0
    container_name: opticine_mysql
    restart: unless-stopped
    environment:
      MYSQL_ROOT_PASSWORD: root
      MYSQL_DATABASE: opticine_db
    ports:
      - "3306:3306"
    volumes:
      - opticine_mysql_data:/var/lib/mysql
    command: --default-authentication-plugin=mysql_native_password

volumes:
  opticine_mysql_data:
    driver: local
