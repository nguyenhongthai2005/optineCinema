server:
  servlet:
    context-path: /api

spring:
  security:
    oauth2:
      client:
        registration:
          google:
            client-id: test-google-client-id
            client-secret: test-google-client-secret
            scope:
              - openid
              - profile
              - email
  datasource:
    url: jdbc:h2:mem:opticine_test;MODE=MySQL;DATABASE_TO_UPPER=false;NON_KEYWORDS=USER,USERS,ROLE,VALUE;DB_CLOSE_DELAY=-1
    driver-class-name: org.h2.Driver
    username: sa
    password:
  jpa:
    hibernate:
      ddl-auto: create-drop
    show-sql: false
    properties:
      hibernate:
        dialect: org.hibernate.dialect.H2Dialect
        format_sql: false
  flyway:
    enabled: false
  mail:
    host: localhost
    port: 2525
    username:
    password:

vnpay:
  tmn-code: TESTONLY
  hash-secret: test-hash-secret
  url: https://sandbox.vnpayment.vn/paymentv2/vpcpay.html
  return-url: http://localhost:8080/api/payment/vnpay/return
  api-url: https://sandbox.vnpayment.vn/merchant_webapi/api/transaction
  version: 2.1.0
  command: pay

app:
  frontend-url: http://localhost:5173
  mail-from: no-reply@opticine.test
  booking:
    close-before-showtime-minutes: 0
  showtime:
    cleaning-buffer-minutes: 15
  payment:
    vietqr:
      enabled: true
      auto-confirm-enabled: true
      demo-amount-enabled: true
      demo-amount-rate: 0.1
      demo-round-to: 1000
      demo-min-amount: 1000
      bank-id: MB
      account-no: "0000000000"
      account-name: OPTICINE TEST
      template: compact2
  attendance:
    location-check-enabled: false

demo:
  staff-password: 123456
